- name: Configure zabbix_server.conf
  template:
    src: zabbix_server.conf.j2
    dest: /etc/zabbix/zabbix_server.conf
    owner: zabbix 
    group: zabbix
    mode: '0644'
  notify: restart zabbix-server

- name: Deploy Zabbix Web Frontend Config
  template:
    src: zabbix.conf.php.j2
    dest: /etc/zabbix/web/zabbix.conf.php
    owner: www-data
    group: www-data

- name: Configure nginx for Zabbix frontend
  template:
    src: zabbix.nginx.j2
    dest: /etc/zabbix/nginx.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart nginx

- name: Install iptables-persistent (if not already)
  apt:
    name: iptables-persistent
    state: present

- name: Allow localhost access to Zabbix web port (80)
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: 80
    source: "127.0.0.1"
    jump: ACCEPT

- name: Allow HAProxy servers access to Zabbix web port (80)
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: 80
    source: "{{ hostvars[item]['ansible_host'] }}"
    jump: ACCEPT
  loop: "{{ groups['lb'] }}"


- name: Drop all other access to Zabbix web port (80)
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: 80
    jump: DROP

- name: Save iptables rules
  shell: iptables-save > /etc/iptables/rules.v4
  changed_when: false

- name: Override PHP settings for Zabbix
  template:
    src: zabbix.php.ini.j2
    dest: /etc/php/8.1/fpm/conf.d/99-zabbix.ini
    owner: root
    group: root
    mode: '0644'
  notify: restart php8.1-fpm

- name: Start services
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
    daemon_reload: yes
  loop:
    - zabbix-server
    - nginx
    - php8.1-fpm