---
- name: Create systemd override directory
  file:
    path: /etc/systemd/system/zabbix-server.service.d
    state: directory
    mode: '0755'

- name: Force systemd to create run directory with correct permissions
  copy:
    dest: /etc/systemd/system/zabbix-server.service.d/override.conf
    content: |
      [Service]
      RuntimeDirectory=zabbix
      RuntimeDirectoryMode=0755
      User=zabbix
      Group=zabbix
  notify: restart zabbix-server
  
- name: Copy Zabbix repository deb package to server
  copy:
    src: zabbix-release_6.4-1+ubuntu22.04_all.deb
    dest: /tmp/zabbix-release.deb
    mode: '0644'

- name: Install Zabbix repository
  apt:
    deb: /tmp/zabbix-release.deb

- name: Update cache
  apt:
    update_cache: yes

- name: Install Zabbix server, frontend, PostgreSQL and SQL scripts
  apt:
    name:
      - zabbix-server-pgsql
      - zabbix-frontend-php
      - php8.1-pgsql
      - zabbix-nginx-conf
      - postgresql
      - zabbix-sql-scripts
      - python3-psycopg2
    state: present

- name: Create Zabbix database user
  community.postgresql.postgresql_user:
    name: zabbix
    password: "{{ vault_zabbix_db_password }}"
    role_attr_flags: NOSUPERUSER,NOCREATEDB
  become: yes
  become_user: postgres

- name: Create Zabbix database
  community.postgresql.postgresql_db:
    name: zabbix
    owner: zabbix
    encoding: UTF-8
  become: yes
  become_user: postgres

- name: Check if Zabbix DB schema is already imported
  become: yes
  become_user: postgres  
  shell: psql -U postgres -d zabbix -tAc "SELECT count(*) FROM information_schema.tables WHERE table_name = 'users';"
  register: zabbix_table_exists
  changed_when: false

- name: Import Zabbix database schema
  become: yes
  become_user: zabbix  
  shell: "zcat /usr/share/zabbix-sql-scripts/postgresql/server.sql.gz | psql -U postgres -d zabbix"
  when: zabbix_table_exists.stdout == "0"

- name: Create Runtime Directory for PID file
  file:
    path: /run/zabbix
    state: directory
    owner: zabbix
    group: zabbix
    mode: '0755'

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  
