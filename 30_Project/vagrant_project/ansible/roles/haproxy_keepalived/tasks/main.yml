---
- name: Install haproxy and keepalived
  apt:
    name:
      - haproxy
      - keepalived
    state: present

- name: Ensure haproxy.pem exists
  stat:
    path: /etc/haproxy/certs/haproxy.pem
  register: haproxy_cert

- name: Create directory for SSL certs
  file:
    path: /etc/haproxy/certs
    state: directory
    owner: root
    group: haproxy
    mode: '0750'
  #when: not haproxy_cert.stat.exists

- name: Generate self-signed certificate with SAN for HAProxy
  command: |
    openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
      -keyout /etc/haproxy/certs/haproxy.key \
      -out /etc/haproxy/certs/haproxy.crt \
      -subj "/CN={{ cluster_vip }}" \
      -addext "subjectAltName=DNS:pdns.otus.local,DNS:zabbix.otus.local,DNS:lb.otus.local,IP:{{ cluster_vip }}"
  args:
    creates: /etc/haproxy/certs/haproxy.key
  notify: restart haproxy

- name: Combine certificate and key into haproxy.pem
  shell: cat /etc/haproxy/certs/haproxy.crt /etc/haproxy/certs/haproxy.key > /etc/haproxy/certs/haproxy.pem
  args:
    creates: /etc/haproxy/certs/haproxy.pem

- name: Configure haproxy
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    validate: /usr/sbin/haproxy -f %s -c
  notify: restart haproxy

- name: Configure keepalived
  template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
  notify: restart keepalived

- name: Allow HTTPS access to HAProxy
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: 443
    jump: ACCEPT

- name: Allow HTTP access to HAProxy
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: 80
    jump: ACCEPT    

- name: Enable and start services
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - haproxy
    - keepalived

