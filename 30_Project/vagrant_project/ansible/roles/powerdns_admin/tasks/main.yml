- name: Remove default nginx sites (avoid port conflicts)
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/nginx/sites-enabled/default
    - /etc/nginx/sites-available/default
    - /etc/nginx/conf.d/default.conf
  notify: restart nginx

#- name:  Set correct permissions on SSL private key
#  file:
#    path: /etc/ssl/private/pdnsadmin.key
#    mode: '0644'

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Configure Nginx Site
  template:
    src: pdnsadmin.nginx.j2
    dest: /etc/nginx/sites-available/pdnsadmin

- name: Enable Nginx Site
  file:
    src: /etc/nginx/sites-available/pdnsadmin
    dest: /etc/nginx/sites-enabled/pdnsadmin
    state: link
  
- name: Install iptables-persistent
  apt:
    name: iptables-persistent
    state: present

- name: Allow localhost access to port 80
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: 80
    source: "127.0.0.1"
    jump: ACCEPT

- name: Allow HAProxy servers access to port 80
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: 80
    source: "{{ hostvars[lb]['ansible_host'] }}"
    jump: ACCEPT
  loop: "{{ groups['lb'] }}"
  loop_control:
    loop_var: lb

- name: Drop all other access to port 80
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: 80
    jump: DROP

- name: Save iptables rules
  shell: iptables-save > /etc/iptables/rules.v4
  changed_when: false

- name: Start and Enable Services
  service:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - pdnsadmin
    - nginx