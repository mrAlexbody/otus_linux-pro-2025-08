---
- name: Add NodeSource repository for Node.js 18
  shell: curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -s -- -y

- name: Install dependencies
  apt:
    name:
      - nginx
      - python3-venv
      - python3-pip
      - git
      - nodejs
      - yarn
      - build-essential
      - libpq-dev
      - libsasl2-dev
      - libldap2-dev
      - libssl-dev
      - libxml2-dev
      - libxslt1-dev
      - xmlsec1
      - pkg-config
      - python3-psycopg2
    state: present
    update_cache: yes

- name: Deploy PowerDNS-Admin from local files
  copy:
    src: PowerDNS-Admin/
    dest: /var/www/html/pdns/
    owner: www-data
    group: www-data

- name: Fix broken requirements.txt for modern pip
  ansible.builtin.replace:
    path: "/var/www/html/pdns/requirements.txt"
    regexp: '--use-feature=no-binary-enable-wheel-cache lxml==4.9.0'
    replace: 'lxml==4.9.0'

- name: Disable mysqlclient (PostgreSQL is used)
  ansible.builtin.replace:
    path: "/var/www/html/pdns/requirements.txt"
    regexp: '^mysqlclient==2.2.1$'
    replace: '# mysqlclient==2.2.1 commented out (PostgreSQL is used)'

- name: Create venv and install requirements
  pip:
    requirements: /var/www/html/pdns/requirements.txt
    virtualenv: /var/www/html/pdns/flask
    virtualenv_command: python3 -m venv
  become: yes
  become_user: www-data
  environment:
    PIP_CACHE_DIR: /tmp/pip-cach

- name: Create configs directory
  file:
    path: /var/www/html/pdns/configs
    state: directory
    owner: www-data
    group: www-data

- name: Configure Production settings
  template:
    src: production.py.j2
    dest: /var/www/html/pdns/configs/production.py
    owner: www-data
    group: www-data

- name: Remove cmdtest if present 
  apt:
    name: cmdtest
    state: absent
  ignore_errors: yes

- name: Download Yarn repository GPG key
  get_url:
    url: https://dl.yarnpkg.com/debian/pubkey.gpg
    dest: /tmp/yarn-pubkey.gpg
    mode: '0644'

- name: Convert and install GPG key
  shell: gpg --dearmor < /tmp/yarn-pubkey.gpg > /etc/apt/trusted.gpg.d/yarn.gpg
  args:
    creates: /etc/apt/trusted.gpg.d/yarn.gpg

- name: Add Yarn repository
  apt_repository:
    repo: "deb https://dl.yarnpkg.com/debian/ stable main"
    state: present
    update_cache: yes

- name: Install Yarn
  apt:
    name: yarn
    state: present

- name: Database Init and Assets Build
  shell: |
    source flask/bin/activate
    export FLASK_APP=powerdnsadmin/__init__.py
    export FLASK_CONF=/var/www/html/pdns/configs/production.py
    flask db upgrade
    yarn install --frozen-lockfile
    flask assets build
  args:
    chdir: /var/www/html/pdns
    executable: /bin/bash
  become: yes
  become_user: www-data
  environment:
    YARN_CACHE_DIR: /tmp/yarn-cache-pdnsadmin
  run_once: true

- name: Set permissions for www-data
  file:
    path: /var/www/html/pdns
    owner: www-data
    group: www-data
    recurse: yes

- name: Create Systemd Service
  template:
    src: pdnsadmin.service.j2
    dest: /etc/systemd/system/pdnsadmin.service
  notify: "reload systemd"

- name: Apply systemd changes immediately before starting services
  meta: flush_handlers

