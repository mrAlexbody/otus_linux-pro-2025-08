---
- hosts: all
  become: yes
  roles:
    - common

- hosts: db
  become: yes
  roles:
    - etcd
    - patroni

- hosts: lb
  become: yes
  roles:
    - haproxy_keepalived      

- hosts: pdns, mon
  become: yes
  roles:
    - postgresql_client

- hosts: pdns
  become: yes
  roles:
    - powerdns
    - powerdns_admin

- hosts: split_dns
  become: yes
  roles:
    - bind9

- hosts: monitoring
  become: yes
  roles:
    - zabbix_server

- hosts: bkp
  become: yes
  roles:
    - barman

- hosts: all
  become: yes
  roles:
    - zabbix_agent