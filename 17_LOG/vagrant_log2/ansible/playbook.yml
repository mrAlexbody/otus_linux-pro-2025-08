---
- name: Common Setup
  hosts: all
  become: true
  tasks:
    - name: Disable SELinux and Firewalld
      shell: |
        setenforce 0 || true
        sed -i 's/^SELINUX=.*/SELINUX=disabled/g' /etc/selinux/config
        systemctl stop firewalld && systemctl disable firewalld
      ignore_errors: true

- name: Configure log2 as Central Log Server + Web + Audit
  hosts: server
  become: true
  tasks:
    - name: Install Nginx, Rsyslog, Audit
      dnf: { name: [nginx, rsyslog, audit, audispd-plugins], state: present }

    - name: Enable Rsyslog Remote Reception (TCP/UDP)
      lineinfile:
        path: /etc/rsyslog.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^[#\s]*module\(load="imudp"\)', line: 'module(load="imudp")' }
        - { regexp: '^[#\s]*input\(type="imudp" port="514"\)', line: 'input(type="imudp" port="514")' }
        - { regexp: '^[#\s]*module\(load="imtcp"\)', line: 'module(load="imtcp")' }
        - { regexp: '^[#\s]*input\(type="imtcp" port="514"\)', line: 'input(type="imtcp" port="514")' }

    - name: Set Template for Remote Logs
      blockinfile:
        path: /etc/rsyslog.conf
        insertafter: EOF
        block: |
          $template RemoteLogs,"/var/log/rsyslog/%HOSTNAME%/%PROGRAMNAME%.log"
          *.* ?RemoteLogs
          & ~
      notify: restart rsyslog

    - name: Create Audit Rules for Nginx
      copy:
        dest: /etc/audit/rules.d/nginx.rules
        content: |
          -w /etc/nginx/nginx.conf -p wa -k nginx_conf
          -w /etc/nginx/conf.d/ -p wa -k nginx_conf
      notify: restart auditd

    - name: Start Services
      service: { name: "{{ item }}", state: started, enabled: true }
      loop: [nginx, rsyslog, auditd]

  handlers: &common_handlers
    - name: restart rsyslog
      service: { name: rsyslog, state: restarted }
    - name: restart nginx
      service: { name: nginx, state: restarted }
    - name: restart auditd
      shell: "service auditd restart || systemctl restart auditd || augenrules --load"
      ignore_errors: true

- name: Configure Web and Log to forward everything to log2
  hosts: clients
  become: true
  vars:
    central_server_ip: "192.168.56.12"
  tasks:
    - name: Install Nginx, Rsyslog and Audit
      dnf: { name: [nginx, rsyslog, audit, audispd-plugins], state: present }

    - name: Forward ALL logs to log2
      copy:
        dest: /etc/rsyslog.d/forward_all.conf
        content: |
          # Пересылка всех системных логов
          *.*  @{{ central_server_ip }}:514

          # Пересылка Audit log (через чтение файла)
          module(load="imfile")
          input(type="imfile" File="/var/log/audit/audit.log" Tag="auditd" Severity="info" Facility="local6")
          local6.* @{{ central_server_ip }}:514
      notify: restart rsyslog

    - name: Audit Nginx configurations
      copy:
        dest: /etc/audit/rules.d/nginx.rules
        content: |
          -w /etc/nginx/nginx.conf -p wa -k nginx_conf
          -w /etc/nginx/conf.d/ -p wa -k nginx_conf
      notify: restart auditd

    - name: Start services
      service: { name: "{{ item }}", state: started, enabled: true }
      loop: [nginx, rsyslog, auditd]

  handlers: *common_handlers
