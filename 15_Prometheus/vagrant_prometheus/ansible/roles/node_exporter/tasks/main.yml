---
- name: Создание пользователя node_exporter
  user:
    name: node_exporter
    shell: /bin/false
    system: yes
    create_home: no

- name: Загрузка node_exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
    mode: 0644

- name: Распаковка
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp
    remote_src: yes
    creates: /tmp/node_exporter-{{ node_exporter_version }}.linux-amd64

- name: Копирование бинарного файла
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    remote_src: yes
    owner: node_exporter
    group: node_exporter
    mode: 0755

- name: Создание systemd unit
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: 0644

- name: Запуск и включение node_exporter
  systemd:
    name: node_exporter
    state: started
    enabled: yes
    daemon_reload: yes

- name: Удаление времянки из /tmp
  file:
    path: /tmp/node_exporter.tar.gz
    state: absent
  file:
    path: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64"
    state: absent

...
