include "/etc/rndc.key";
options {
    # Порты и адреса прослушивания
    listen-on port 53 { 127.0.0.1; 192.168.56.10; };
    listen-on-v6 port 53 { ::1; };

    # Пути к рабочим файлам
    directory   "/var/named";
    dump-file   "/var/named/data/cache_dump.db";
    statistics-file "/var/named/data/named_stats.txt";
    memstatistics-file "/var/named/data/named_mem_stats.txt";

    # Настройки рекурсии и прав на запросы
    recursion yes;
    allow-query     { any; };
    allow-transfer { any; };
    
    # Настройки безопасности DNSSEC
    #dnssec-enable yes;
    dnssec-validation yes;

    # Системные файлы ключей и PID
    bindkeys-file "/etc/named.iscdlv.key";
    managed-keys-directory "/var/named/dynamic";
    pid-file "/run/named/named.pid";
    session-keyfile "/run/named/session.key";
};

logging {
    channel default_debug {
        file "data/named.run";
        severity dynamic;
    };
};

# Ключ управления RNDC (В Almalinux9 это не работает!!!)
#key "rndc-key" {
#    algorithm hmac-md5;
#    secret "GrtiE9kz16GK+OKKU/qJvQ==";
#};

# Кому разрешено управлять сервером через rndc
controls {
    inet 127.0.0.1 allow { localhost; } keys { "rndc-key"; };
    inet 192.168.56.10 allow { 192.168.56.15; 192.168.56.16; } keys { "rndc-key"; }; 
};

# Индивидуальные ключи клиентов
key "client1-key" {
    algorithm hmac-sha256;
    secret "hhRAf5ePYIwv99SmO1/sN6HibV9u1o+mjLI4kJc0XuY=";
};
key "client2-key" {
    algorithm hmac-sha256;
    secret "FGSuvjlp+h0ZX97/OpNFQVPk0eB61OqvQ8/X+3ZjokE=";
};

# Общий ключ для трансфера зон между серверами
include "/etc/named.zonetransfer.key"; 

# Настройка взаимодействия с Slave-сервером
server 192.168.56.11 {
    keys { "zonetransfer.key"; };
};

# ACL (списки доступа) для разделения клиентов по IP и ключам
acl client1 { !key client2-key; key client1-key; 192.168.56.15; };
acl client2 { !key client1-key; key client2-key; 192.168.56.16; };

# Вид (view) для Клиента 1: видит обе зоны, но в dns.lab только web1
view "client1" {
    match-clients { client1; };

    zone "dns.lab" {
        type master;
        # Специальный файл зоны только с записью web1
        file "/etc/named/named.dns.lab.client";
        also-notify { 192.168.56.11 key client1-key; };
    };

    zone "newdns.lab" {
        type master;
        # Видит эту зону (www смотрит на обоих клиентов)
        file "/etc/named/named.newdns.lab";
        also-notify { 192.168.56.11 key client1-key; };
    };
};

# Вид (view) для Клиента 2: видит только зону dns.lab
view "client2" {
    match-clients { client2; };

    zone "dns.lab" {
        type master;
        # Общий файл зоны (web1 и web2)
        file "/etc/named/named.dns.lab";
        also-notify { 192.168.56.11 key client2-key; };
    };

    zone "56.168.192.in-addr.arpa" {
        type master;
        file "/etc/named/named.dns.lab.rev";
        also-notify { 192.168.56.11 key client2-key; };
    };
};

# Вид по умолчанию для остальных запросов (в т.ч. слейва)
view "default" {
    match-clients { any; };

    zone "." IN {
        type hint;
        file "named.ca";
    };

    include "/etc/named.rfc1912.zones";
    include "/etc/named.root.key";

    zone "dns.lab" {
        type master;
        allow-transfer { key "zonetransfer.key"; };
        file "/etc/named/named.dns.lab";
    };

    zone "56.168.192.in-addr.arpa" {
        type master;
        allow-transfer { key "zonetransfer.key"; };
        file "/etc/named/named.dns.lab.rev";
    };

    zone "newdns.lab" {
        type master;
        allow-transfer { key "zonetransfer.key"; };
        file "/etc/named/named.newdns.lab";
    };
};
