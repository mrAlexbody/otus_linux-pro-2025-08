---
- name: "Базовая подготовка всех ВМ"
  hosts: all
  become: yes
  gather_facts: yes
  tasks:
    - name: "Обновление кеша пакетов"
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: "Установка необходимых пакетов"
      apt:
        name:
          - openvpn
          - iperf3
          - easy-rsa
          - traceroute
          - tcpdump
          - net-tools
          - curl
        state: present

- name: "Настройка сервера (TAP)"
  hosts: vpn_server
  become: yes
  tasks:
    - name: "Генерация статического ключа"
      command: openvpn --genkey secret /etc/openvpn/static.key
      args: { creates: /etc/openvpn/static.key }

    - name: "Чтение ключа для передачи"
      slurp: { src: /etc/openvpn/static.key }
      register: static_key_slurp

    - name: "Сохранение ключа в факт"
      set_fact: { server_static_key: "{{ static_key_slurp.content }}" }

    - name: "Конфигурация TAP сервера"
      copy:
        dest: /etc/openvpn/server-tap.conf
        content: |
          dev tap
          ifconfig 10.10.10.1 255.255.255.0
          topology subnet
          secret /etc/openvpn/static.key
          comp-lzo
          status /var/log/openvpn-status-tap.log
          verb 3

    - name: "Запуск TAP на сервере"
      systemd: 
        name: openvpn@server-tap 
        state: restarted 
        enabled: yes

    - name: "Запуск iperf3 в фоне"
      shell: "killall iperf3 || true; iperf3 -s -D"
      changed_when: false           

- name: "Настройка клиента (TAP)"
  hosts: vpn_client
  become: yes
  tasks:
    - name: "Установка OpenVPN"
      apt: { name: openvpn, update_cache: yes }

    - name: "Копирование ключа с сервера"
      copy:
        content: "{{ hostvars['server']['server_static_key'] | b64decode }}"
        dest: /etc/openvpn/static.key
        mode: '0600'

    - name: "Конфигурация TAP клиента"
      copy:
        dest: /etc/openvpn/client-tap.conf
        content: |
          dev tap
          remote 192.168.56.10
          ifconfig 10.10.10.2 255.255.255.0
          topology subnet
          secret /etc/openvpn/static.key
          comp-lzo
          verb 3

    - name: "Запуск TAP на клиенте"
      systemd: { name: openvpn@client-tap, state: restarted, enabled: yes }

    - name: "Пауза для инициализации соединений"
      pause:
        seconds: 5

    - name: "Пинг сервера через TAP (10.10.10.1)"
      command: ping -c 3 10.10.10.1
      register: ping_tap
      ignore_errors: yes

    - debug:
        msg: 
          - "TAP Status: {{ 'OK' if ping_tap.rc == 0 else 'FAILED' }}"

    - name: "Вывод логов TAP при ошибке"
      command: tail -n 20 /var/log/openvpn-tap.log
      when: ping_tap.rc != 0
      delegate_to: server
      ignore_errors: yes

    - name: "Замер скорости в TAP режиме"
      shell: iperf3 -c 10.10.10.1 -t 40 -i 5 > /tmp/iperf_tap.log
      when: ping_tap.rc == 0

    - name: "Сохранить результаты TAP замера в общую папку"
      copy:
        src: /tmp/iperf_tap.log
        dest: /vagrant/iperf_tap.log
        remote_src: yes
      when: ping_tap.rc == 0

